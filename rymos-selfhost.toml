[selfhost]
name = "RYMOS Rust self-hosting"
milestone = 8
goal = "Run a Rust toolchain on RYMOS after the OS grows enough POSIX-like runtime support."

[[requirement]]
name = "Program ABI"
status = "partial"
detail = "ELF programs run synchronously in trusted kernel mode with ABI v10, descriptor IO, stdio fds, stat, listing, mkdir, unlink, rename, environment reads, process status, heap page allocation, and monotonic ticks."

[[requirement]]
name = "Core Runtime"
status = "partial"
detail = "rymos-user exposes console, args, pid, line input, and read-only BootFS reads."

[[requirement]]
name = "Persistent Filesystem"
status = "partial"
detail = "RYMFS3 persists 256 MiB files in contiguous dynamic extents with 96 entries and compact nested directories with unlink/rename, but rustc still needs richer directory behavior and non-contiguous allocation."

[[requirement]]
name = "Process Model"
status = "partial"
detail = "PIDs, exit status, and ABI wait/status exist; spawn is blocked until app loading can isolate or relocate child programs."

[[requirement]]
name = "Memory Management"
status = "partial"
detail = "UEFI memory map, physical page allocation, kernel-owned PML4, virtual mappings, per-process heap windows, and heap unmap/reclaim exist; rustc still needs mmap-like behavior, page-table reclaim, and larger address spaces."

[[requirement]]
name = "File Descriptor ABI"
status = "partial"
detail = "BootFS read handles, RYMFS3 read/write/seek handles, stat, listing, compact nested mkdir, unlink, rename, 96 entries, and 256 MiB files exist."

[[requirement]]
name = "Toolchain Target"
status = "partial"
detail = "x86_64-rymos.json exists; custom target builds need nightly/rust-src today."

[[requirement]]
name = "libcore"
status = "planned"
detail = "Build core and compiler_builtins for x86_64-rymos."

[[requirement]]
name = "liballoc"
status = "partial"
detail = "rymos-user grows a bump heap through kernel-mapped pages and can run Vec/String smoke tests in per-process virtual windows; heap data pages are unmapped and reclaimed on process exit."

[[requirement]]
name = "libstd"
status = "planned"
detail = "Requires more RYMOS implementations for safe process spawning, calibrated time, networking stubs, and synchronization; read-only env and raw tick support have started."

[[requirement]]
name = "Rust Compiler"
status = "blocked"
detail = "Port only after libstd, large persistent filesystem, process spawning, and enough memory are available."
