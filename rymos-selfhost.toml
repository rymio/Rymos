[selfhost]
name = "RYMOS Rust self-hosting"
milestone = 8
goal = "Run a Rust toolchain on RYMOS after the OS grows enough POSIX-like runtime support."

[[requirement]]
name = "Program ABI"
status = "partial"
detail = "ELF programs run synchronously in trusted kernel mode with ABI v22, argv-preserving spawn_argv, argv-style reads, process-local environment overrides, parent/child tracking, consuming wait/wait_any status, synchronous spawn with inherited std fds, pipe-fed child stdin, separate stdout/stderr capture, descriptor IO, stdio fds, pipes, dup2 redirection, stat, listing, mkdir, unlink, rename, cwd/path resolution, errno-style last_error, environment reads, process status, heap and mmap-style page allocation, and calibrated monotonic ticks (v22 -- see Time and OS Services). stat/list now also report created/modified tick timestamps and a permission-style mode byte."

[[requirement]]
name = "Core Runtime"
status = "partial"
detail = "rymos-user exposes console, raw args, argv reads, mutable env wrappers, pid, line input, read-only BootFS reads, and a stdish compatibility shim for fs/env/process/io/time/path/temp-dir/error basics."

[[requirement]]
name = "Persistent Filesystem"
status = "partial"
detail = "RYMFS5 persists 256 MiB files across up to 4 non-contiguous extents per file, 256 entries with 96-byte names, compact nested directories, unlink/rename, append/create-new open modes, OpenOptions-style runtime wrappers, per-entry created/modified tick timestamps plus a permission-style mode byte, and sparse writes (seeking past the current end and writing zero-fills the gap instead of leaving stale disk contents). Growth coalesces into the last extent when the newly-found free run is physically contiguous with it, so ordinary sequential writes don't burn through the 4-extent budget on nothing but adjacent sectors. Verified live in QEMU: a file too big to fit in a single freed hole between two other files split cleanly across two extents and read back byte-exact; a path well past the old 30-byte limit, a sparse write with a zero-filled gap, and 20 concurrent open file descriptors all round-tripped correctly. Still open: the 256-entry/96-byte-name ceilings are fixed compile-time limits, not true unbounded growth -- that would mean moving the entry table itself onto growable disk extents (the header is read into a stack-local buffer in a few places today, which is the actual limiter on how far a fixed bump can safely go)."

[[requirement]]
name = "Process Model"
status = "partial"
detail = "PIDs, parent PID tracking, exit status, consuming ABI wait/wait_any, and synchronous spawn with inherited std fds exist. Spawned children now run in their own isolated address space (see Memory Management), which removed the old fixed-address snapshot/restore-ELF dance and fixed a real bug where a child's execution silently corrupted the parent's writable globals. A real reaping bug is now fixed: a brand-new spawn used to silently reuse any Exited/Failed process-table slot regardless of whether its real parent had ever called wait/wait_any on it, destroying a genuine child's exit status before it was ever collected; slot reuse now requires the zombie to already be waited on (process_find_reapable_slot), and top-level console `run`'d processes (which have no ABI parent to wait on them) are marked pre-reaped so they don't become permanent zombies. Concurrent (actually parallel/interleaved) children still need a real scheduler: there is still no saved per-process CPU register/stack context and no preemption, so execution is still a synchronous nested call -- isolation means a child can no longer corrupt its parent's memory, not that parent and child run at the same time. A genuinely deferred/queued spawn (enqueue at spawn time, actually run later when something waits) was attempted and reverted after it broke live in QEMU: several of rysh's own shell built-ins, and rymos-user's Command helpers, redirect stdio/cwd/env, spawn, and read the result with no intervening wait() call at all, relying entirely on spawn's synchronous completion -- deferring it left a redirected pipe disconnected from ever being read. Fixing every affected caller is a separate, large audit, not a bounded slice of this milestone."

[[requirement]]
name = "Memory Management"
status = "partial"
detail = "UEFI memory map, physical page allocation, kernel-owned PML4, virtual mappings, per-process heap windows, guarded mmap-like map/unmap regions, and process-exit unmap/reclaim exist. Spawned children now get their own private PML4 for the fixed program-image window (0x200000-0x9000000): a shallow top-level PML4 clone plus selectively-privatized PDPT/PD entries just for that range, so the kernel's own mappings and every process's heap/mmap windows stay shared while each process's code/data is genuinely isolated. destroy_process_address_space reclaims the private PT/PD/PDPT/PML4 structural pages plus any data pages still mapped there, so this doesn't leak a page-table page per spawn. Heap/mmap page-table page reclaim is now done too: reclaim_process_window_tables frees the PT pages (heap) or PD+PT pages (mmap) exclusively owned by an exiting PID's window, safe without a private-PML4 walk because each PID's window sits at a fixed, alignment-guaranteed address (a heap window is exactly a quarter of one shared PD; a mmap window is exactly one whole, exclusively-owned PD) purely as a function of its own never-reused PID. Verified live in QEMU: three consecutive spawn/exit cycles of the same program leave the physical page allocator's used-page count exactly flat, not growing per cycle. The kernel also now has its first CPU exception handling: an IDT (built without a new GDT -- it reads whichever code-segment selector UEFI's firmware already set up) with hand-written naked-function stubs (the x86-interrupt ABI is nightly-only; this kernel builds on stable) for all 32 exception vectors turns a fault -- a guard-page touch, a null-pointer access, a divide-by-zero, an invalid opcode -- into a clear serial diagnostic (vector, mnemonic, error code, CR2 for page faults, faulting RIP, current PID/process name) followed by a clean halt, instead of a silent, undiagnosable QEMU reset. Verified live in QEMU across guard-page (both before and after the mapped region), raw hardware divide-by-zero, and invalid-opcode faults via a new `faultcheck` program (deliberately not part of the automated regression, since a passing run halts the machine). Found and disclosed, not fixed, along the way: a null-pointer write does *not* fault today, because address 0 is already mapped as part of the low-memory identity mapping rather than being guarded -- a real, separate memory-layout gap. Also disclosed: recovering from a fault (killing just the offending process, not the whole OS) needs a prepared non-local-exit point to unwind an arbitrary nested Rust call stack, and a double fault caused by genuine kernel stack exhaustion could still overrun into a real triple fault without a dedicated IST/TSS stack for it -- both separate, larger pieces of work, not attempted here. Assessed (not changed): per-process heap (256 MiB) and mmap (768 MiB) window sizes are already far larger than what fits in a 256 MiB QEMU test VM once the 142 MiB fixed program-image reservation is accounted for -- the real ceiling today is available physical RAM and that reservation, not the virtual window sizes, so raising the latter wouldn't currently buy anything. Still open: relocatable/PIE loading (every process still uses the same virtual address for its image, just backed by different physical pages -- this is isolation via separate tables, not relocation)."

[[requirement]]
name = "File Descriptor ABI"
status = "partial"
detail = "BootFS read handles, RYMFS5 read/write/append/seek handles, stat, listing, compact nested mkdir, unlink, rename, 256 entries, 256 MiB files, per-entry timestamps/mode, non-contiguous (up to 4 extents) allocation per file, sparse writes, and up to 32 concurrent per-process file descriptors (raised from 8) exist."

[[requirement]]
name = "Toolchain Target"
status = "partial"
detail = "x86_64-rymos.json now parses on current nightly (target-pointer-width/target-c-int-width as integers, explicit rustc-abi=softfloat, max-atomic-width, and singlethread=true) and RYMOS_TARGET_MODE=custom plus nightly rust-src builds real programs end to end via `-Z build-std -Z json-target-spec`. A forked rust-lang/rust checkout also lives at toolchain/rust (git submodule) with a patched library/std for real std support; see the libstd entry."

[[requirement]]
name = "libcore"
status = "partial"
detail = "core, alloc, and compiler_builtins now build and link for x86_64-rymos via nightly build-std; verified end to end by building and installing the hello program through scripts/rymos-sdk.py's custom target mode."

[[requirement]]
name = "liballoc"
status = "partial"
detail = "rymos-user grows a bump heap through kernel-mapped pages, exposes guarded mmap-like regions, and can run Vec/String smoke tests in per-process virtual windows; mapped data pages are unmapped and reclaimed on process exit."

[[requirement]]
name = "libstd"
status = "partial"
detail = "A real std program now boots and runs on x86_64-rymos: toolchain/rust (a forked rust-lang/rust checkout, built locally via ./x.py build library/std --stage 1) adds sys::pal::rymos with a real _start(abi) -> i32 entry that stores the ABI pointer and calls the compiler-generated main() from #[lang = \"start\"] (same pattern as Hermit's runtime_entry), a real bump allocator in sys::alloc::rymos over mem_alloc_pages, and real Stdout/Stderr writes through the ABI console call in sys::stdio::rymos. Category 5 (Rust target and libraries) landed real implementations, not just stdio/alloc, for most of the rest: sys::env (real getenv/setenv/unsetenv/env() against the ABI's env_get/env_list/env_set/env_remove, no local cache needed since the kernel is the source of truth), sys::args (real argv via argv_count/argv_get -- queried live on every call rather than cached at start, since unlike env vars argv never changes after a process starts), sys::paths (real getcwd/chdir/temp_dir against the ABI's cwd/chdir/TMPDIR env var), sys::fs (a real File plus stat/list/mkdir/unlink/rename-backed directory operations; RYMOS has no symlinks/hardlinks/file locking/permission-setting so those honestly stay unsupported rather than faking them), sys::io::error (real ERR_* to ErrorKind mapping via the ABI's last_error, replacing the old generic fallback that always claimed success), sys::random (RDRAND when CPUID reports it, falling back to a disclosed-non-cryptographic TSC-seeded PRNG instead of panicking), and sys::time's Instant and SystemTime (both fully real now that category 4 calibrated time_ticks and added time_unix_nanos -- see Time and OS Services; duration arithmetic and SystemTime::now() both work, verified live in QEMU). std::process::Command deliberately stays unsupported -- a real design mismatch (RYMOS resolves programs by name through bootfs, not a resolved filesystem path; Stdio/pipe wiring would need sys::pipe support too), not a bounded ABI-wiring task like the others; std::process::id() is real via the ABI's pid call. Verified live in QEMU with a new stdreal program (a genuine #![feature(restricted_std)] binary, not routed through rymos-user) exercising pid, real argv, env get/set/iterate/remove, cwd/temp_dir, file write/read_to_string/exists/read_dir, Instant ordering, and a HashMap (exercising the new random support) -- all correct, alongside the full existing no_std regression suite. Found and fixed along the way: the bootloader's hardcoded 4 MiB INITRD_READ_LIMIT silently truncated bootfs once a debug std binary's size exceeded it (raised to 32 MiB, still relevant); a stale `-Z build-std` target cache silently kept using pre-edit sys module code after a fresh source change, masquerading as unrelated crashes until `rm -rf target/x86_64-rymos` forced a real rebuild -- exactly the gotcha already flagged in docs/dev-environment.md, hit for real this time. std::thread::sleep is also real now (category 4's sleep_nanos), verified via a real 15ms sleep measured against real Instant duration arithmetic. Still open: real thread spawning (not needed while RYMOS stays single-threaded per process; sleep needed no spawning support to be real)."

[[requirement]]
name = "Time and OS Services"
status = "partial"
detail = "Category 4: `time_ticks` used to be a raw `rdtsc` read with no defined relationship to real time; `calibrate_tsc` now measures `rdtsc` ticks per second once at boot by polling the legacy PIT's channel 2 (a known countdown, `rdtsc` before/after, no timer interrupt needed -- this kernel deliberately still has none besides CPU exceptions), averaged across 4 rounds to reduce jitter from a single ~50 ms sample. `time_ticks` (ABI v22) now returns real calibrated nanoseconds since boot. Real wall-clock time also exists now: `time_unix_nanos` reads the CMOS RTC once at boot (BCD-or-binary, 12-or-24-hour, with the classic UIP-wait-then-double-read technique for a torn read) paired with the calibration's boot `rdtsc` snapshot, converted via Howard Hinnant's `days_from_civil` algorithm -- verified live in QEMU against the real host clock (matched the actual date, not just 'a plausible number'). `sleep_nanos` busy-waits against the calibrated clock -- correct, not a placeholder, since RYMOS has no scheduler to hand the CPU to during a sleep anyway. `term_size` reports the console's real row/column count. All four are wired all the way through: kernel ABI, `rymos-user` (`time_ticks`/`time_unix_nanos`/`sleep_nanos`/`term_size`), and `toolchain/rust`'s `std` (`Instant`'s duration arithmetic and `SystemTime` are both real now, no longer honestly-unsupported stubs -- see libstd; `std::thread::sleep` is real too, since sleeping the *current* thread needs no multi-threading support). Verified live in QEMU: `stdshim` sleeps 10 ms and confirms elapsed ticks matches; a `stdreal` `std::thread::sleep(15ms)` measured via real `Instant::checked_duration_since` came back ~15.14 ms; `SystemTime::now().duration_since(UNIX_EPOCH)` reported a plausible real date matching the host. Still open: real terminal/TTY behavior beyond a size query (no raw/cooked mode switching, no ANSI/VT100 escape handling -- left for whenever a concrete consumer needs it, not spec'd out speculatively); sync primitives need no new work (`no_threads` remains the correct answer while RYMOS stays single-threaded per process)."

[[requirement]]
name = "Rust Compiler"
status = "blocked"
detail = "Port only after libstd, large persistent filesystem, process spawning, and enough memory are available."
