[package]
name = "moros"
description = "MOROS: Obscure Rust Operating System"
version = "0.13.0"
authors = ["Vincent Ollivier <v@vinc.cc>"]
edition = "2018"
license = "MIT"
repository = "https://github.com/vinc/moros"
readme = "README.md"
default-run = "moros"

[features]
default = ["video"]
video = []
serial = []
userspace = []

[dependencies]
acpi = "5.0.0"
aml = "0.16.4"
base64 = { version = "0.22.1", default-features = false, features = ["alloc"] }
bit_field = "0.10.3"
bootloader = { version = "0.9.34", features = ["map_physical_memory"] }
chumsky = { version = "0.13.0", default-features = false }
geodate = { version = "0.5.0", default-features = false }
lazy_static = { version = "1.5.0", features = ["spin_no_std"] }
libm = "0.2.16"
linked_list_allocator = "0.10.6"
littlewing = { version = "0.8.0", default-features = false }
miniz_oxide = "0.9.1"
nom = { version = "8.0.0", default-features = false, features = ["alloc"] }
num-bigint = { version = "0.4.6", default-features = false }
num-traits = { version = "0.2.19", default-features = false }
object = { version = "0.39.1", default-features = false, features = ["read"] }
pbkdf2 = { version = "0.12.2", default-features = false, features = ["hmac"] }
pc-keyboard = "0.8.0"
pic8259 = "0.11.0"
rand = { version = "0.9.2", default-features = false }
rand_hc = "0.4.0"
raw-cpuid = "11.6.0"
sha2 = { version = "0.10.9", default-features = false, features = ["force-soft"] }
smoltcp = { version = "0.13.1", default-features = false, features = ["alloc", "medium-ethernet", "socket-tcp", "socket-udp", "socket-dhcpv4", "proto-ipv4", "proto-dhcpv4"] }
spin = "0.12.0"
time = { version = "0.2.27", default-features = false }
uart_16550 = "0.4.0"
vte = "0.13.1"
x86_64 = "0.15.2"

[package.metadata.bootloader]
physical-memory-offset = "0xFFFF800000000000"
kernel-stack-address   = "0xFFFFFF8000000000"
boot-info-address      = "0xFFFFFFFF80000000"

[package.metadata.bootimage]
test-success-exit-code = 33 # (0x10 << 1) | 1
